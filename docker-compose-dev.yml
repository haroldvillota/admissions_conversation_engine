services:
  app-cli:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: admissions-conversation-engine:dev
    ports:
      - "2024:2024"
    env_file: .env
    volumes:
      # Hot-reload: los cambios en src/ se reflejan sin reconstruir la imagen
      - ./src:/app/src
    command: cli
    stdin_open: true
    tty: true
    networks:
      - intranet

networks:
  intranet:
    external: true